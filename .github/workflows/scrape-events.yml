name: Scrape Mumbai Events

on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST (midnight UTC + 30 min)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push events-cache.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape allevents.in
        run: node scripts/scrape-events.mjs

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events-cache.json
          git diff --cached --quiet || git commit -m "chore: refresh Mumbai events cache [skip ci]"
          git push
