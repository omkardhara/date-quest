name: Scrape Mumbai Events

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (0:00, 6:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npm install playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape events (BMS + allevents)
        run: node scripts/scrape-events.mjs
        timeout-minutes: 15

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events-cache.json data/movies-cache.json
          git diff --cached --quiet && echo "no cache changes" && exit 0
          git commit -m "chore: refresh Mumbai events + movies cache [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying in 5s…"
            sleep 5
          done
